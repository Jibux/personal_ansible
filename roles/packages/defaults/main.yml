---
apt_packages:
  - git
  - xsel
  - xclip
  - tree
  - htop
  - vim
  - vim-common
  - vim-gtk3
  - vim-gui-common
  - vim-nox
  - vim-runtime
  - vim-tiny
    # - rxvt-unicode-256color
  - tmux
  - tmux-plugin-manager
  - pandoc
  - shellcheck
  - terminator
  - pkg-config
  - g++
  - python3-dev
  - exiftool
  - wakeonlan
  - bind9-dnsutils
  - bind9-host

apt_linux_desktop_packages:
  - exfatprogs
  - gparted
  - lvm2
  - nvme-cli
  - smartmontools

apt_wsl_packages:
  # To display correctly some chars
  - fonts-noto
  - fonts-noto-mono
  - fonts-noto-extra
  # To open web links
  - wslu

brew_bin_real_path_default: /home/linuxbrew/.linuxbrew/bin/brew
brew_bin_venv_path: '{{ project_root_path }}/.venv/bin/brew'
brew_exec_venv_path: '{{ brew_bin_venv_path|dirname }}'

brews:
  - formulae: bat
  - formulae: fzf
  - formulae: ripgrep
