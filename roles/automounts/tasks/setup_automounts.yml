---
- name: Copy credentials file
  copy:
    src: "{{ automounts_group.credentials_file.src }}"
    dest: "{{ automounts_group.credentials_file.dest }}"
    mode: 0400
  no_log: true

- include_tasks:
    file: setup_automount.yml
  loop: "{{ automounts_group.mounts }}"
  loop_control:
    loop_var: automount_item
  vars:
    automount_item_name: "{{ automounts_group.name }}-{{ automount_item.name }}"
    automount_item_name_escaped: "{{ (automounts_group.name + '-' + automount_item.name)|replace('-', '\\x2d') }}"
    mount_root: "/mnt"
